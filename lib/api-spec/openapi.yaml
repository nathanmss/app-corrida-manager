openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification for Treinão Encontro das Águas — 2ª Edição
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: events
    description: Public event information
  - name: registrations
    description: Public registration operations
  - name: admin
    description: Admin-only operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect after OIDC callback.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'

  /events/active:
    get:
      operationId: getActiveEvent
      tags: [events]
      summary: Get the active event
      responses:
        "200":
          description: Active event found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
        "404":
          description: No active event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /registrations:
    post:
      operationId: createRegistration
      tags: [registrations]
      summary: Register a participant (public, no auth)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegistrationInput"
      responses:
        "201":
          description: Registration created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegistrationConfirmation"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Duplicate registration detected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /registrations/{code}:
    get:
      operationId: getRegistrationByCode
      tags: [registrations]
      summary: Get registration by confirmation code (for success page)
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Registration found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegistrationConfirmation"
        "404":
          description: Registration not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /admin/registrations:
    get:
      operationId: listAdminRegistrations
      tags: [admin]
      summary: List all registrations with filters
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: route
          in: query
          required: false
          schema:
            type: string
        - name: sex
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: shirtSize
          in: query
          required: false
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Paginated list of registrations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminRegistrationList"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /admin/registrations/{id}:
    get:
      operationId: getAdminRegistration
      tags: [admin]
      summary: Get a single registration
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Registration found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminRegistration"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    patch:
      operationId: updateAdminRegistration
      tags: [admin]
      summary: Update a registration
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegistrationUpdate"
      responses:
        "200":
          description: Registration updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminRegistration"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /admin/export:
    get:
      operationId: exportRegistrations
      tags: [admin]
      summary: Export registrations as CSV
      responses:
        "200":
          description: CSV file
          content:
            text/csv:
              schema:
                type: string
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    Event:
      type: object
      required: [id, name, description, eventDate, eventTime, location, status, routes]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        eventDate:
          type: string
        eventTime:
          type: string
        location:
          type: string
        registrationDeadline:
          type: ["string", "null"]
        status:
          type: string
        routes:
          type: array
          items:
            $ref: "#/components/schemas/Route"

    Route:
      type: object
      required: [id, name, distanceKm, description]
      properties:
        id:
          type: integer
        name:
          type: string
        distanceKm:
          type: integer
        description:
          type: string
        participantLimit:
          type: ["integer", "null"]

    RegistrationInput:
      type: object
      required: [eventId, routeId, fullName, cpf, whatsapp, birthDate, sex, acceptedTerms]
      properties:
        eventId:
          type: integer
        routeId:
          type: integer
        fullName:
          type: string
          minLength: 2
        cpf:
          type: string
          minLength: 11
          maxLength: 14
          pattern: '^\d{3}\.?\d{3}\.?\d{3}-?\d{2}$'
        whatsapp:
          type: string
          minLength: 8
        email:
          type: ["string", "null"]
          format: email
        birthDate:
          type: string
          format: date
        sex:
          type: string
          enum: [masculino, feminino, outro]
        city:
          type: ["string", "null"]
        neighborhood:
          type: ["string", "null"]
        team:
          type: ["string", "null"]
        shirtSize:
          type: ["string", "null"]
          enum: [PP, P, M, G, GG, XG, null]
        medicalNotes:
          type: ["string", "null"]
        emergencyContactName:
          type: ["string", "null"]
        emergencyContactWhatsapp:
          type: ["string", "null"]
        acceptedTerms:
          type: boolean
        termsVersion:
          type: ["string", "null"]

    RegistrationConfirmation:
      type: object
      required: [id, registrationCode, fullName, routeName, eventName, eventDate, eventTime, location, createdAt]
      properties:
        id:
          type: integer
        registrationCode:
          type: string
        fullName:
          type: string
        routeName:
          type: string
        eventName:
          type: string
        eventDate:
          type: string
        eventTime:
          type: string
        location:
          type: string
        createdAt:
          type: string

    AdminRegistration:
      type: object
      required: [id, registrationCode, fullName, cpf, whatsapp, birthDate, sex, routeName, status, acceptedTerms, createdAt]
      properties:
        id:
          type: integer
        registrationCode:
          type: string
        fullName:
          type: string
        cpf:
          type: string
        whatsapp:
          type: string
        email:
          type: ["string", "null"]
        birthDate:
          type: string
        age:
          type: ["integer", "null"]
        sex:
          type: string
        city:
          type: ["string", "null"]
        neighborhood:
          type: ["string", "null"]
        team:
          type: ["string", "null"]
        shirtSize:
          type: ["string", "null"]
        medicalNotes:
          type: ["string", "null"]
        emergencyContactName:
          type: ["string", "null"]
        emergencyContactWhatsapp:
          type: ["string", "null"]
        routeId:
          type: integer
        routeName:
          type: string
        status:
          type: string
        acceptedTerms:
          type: boolean
        acceptedTermsAt:
          type: ["string", "null"]
        termsVersion:
          type: ["string", "null"]
        internalNotes:
          type: ["string", "null"]
        createdAt:
          type: string

    AdminRegistrationList:
      type: object
      required: [data, total, page, pageSize]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/AdminRegistration"
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer

    RegistrationUpdate:
      type: object
      properties:
        routeId:
          type: integer
        fullName:
          type: string
        cpf:
          type: string
        whatsapp:
          type: string
        email:
          type: ["string", "null"]
        birthDate:
          type: string
        sex:
          type: string
        city:
          type: ["string", "null"]
        neighborhood:
          type: ["string", "null"]
        team:
          type: ["string", "null"]
        shirtSize:
          type: ["string", "null"]
        medicalNotes:
          type: ["string", "null"]
        emergencyContactName:
          type: ["string", "null"]
        emergencyContactWhatsapp:
          type: ["string", "null"]
        status:
          type: string
        internalNotes:
          type: ["string", "null"]

    RouteStats:
      type: object
      required: [routeName, distanceKm, count]
      properties:
        routeName:
          type: string
        distanceKm:
          type: integer
        count:
          type: integer

    SexStats:
      type: object
      required: [sex, count]
      properties:
        sex:
          type: string
        count:
          type: integer

    ShirtStats:
      type: object
      required: [shirtSize, count]
      properties:
        shirtSize:
          type: string
        count:
          type: integer

    StatusStats:
      type: object
      required: [status, count]
      properties:
        status:
          type: string
        count:
          type: integer

    AdminStats:
      type: object
      required: [total, byRoute, bySex, byShirt, byStatus, recentRegistrations]
      properties:
        total:
          type: integer
        byRoute:
          type: array
          items:
            $ref: "#/components/schemas/RouteStats"
        bySex:
          type: array
          items:
            $ref: "#/components/schemas/SexStats"
        byShirt:
          type: array
          items:
            $ref: "#/components/schemas/ShirtStats"
        byStatus:
          type: array
          items:
            $ref: "#/components/schemas/StatusStats"
        recentRegistrations:
          type: array
          items:
            $ref: "#/components/schemas/AdminRegistration"
